services:
  postgres:
    image: postgres:16-alpine
    container_name: engram-cloud-postgres
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram_dev
      POSTGRES_DB: engram_cloud
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram -d engram_cloud"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - engram-cloud-pg:/var/lib/postgresql/data

  cloud:
    build:
      context: .
      dockerfile: docker/cloud/Dockerfile
    container_name: engram-cloud
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENGRAM_DATABASE_URL: postgres://engram:engram_dev@postgres:5432/engram_cloud?sslmode=disable
      ENGRAM_JWT_SECRET: engram-dev-jwt-secret-for-local-smoke-1234
      ENGRAM_CLOUD_INSECURE_NO_AUTH: "1"
      ENGRAM_CLOUD_ALLOWED_PROJECTS: smoke-project
      ENGRAM_CLOUD_HOST: 0.0.0.0
      ENGRAM_PORT: "18080"
      # ENGRAM_CLOUD_TOKEN_PEPPER: replace-with-dedicated-managed-token-pepper
      # Required both to run `engram cloud bootstrap admin --issue-token`
      # against this stack AND to make the resulting managed tokens actually
      # authenticate against this running server. Must be a secret distinct
      # from ENGRAM_JWT_SECRET above. Left commented out here because this
      # stack runs in ENGRAM_CLOUD_INSECURE_NO_AUTH mode by default.
    ports:
      - "127.0.0.1:18080:18080"
    command: ["cloud", "serve"]

volumes:
  engram-cloud-pg:
